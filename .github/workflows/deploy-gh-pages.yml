name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # 推送到 master 时自动触发
  workflow_dispatch: # 允许手动触发

# 允许 GitHub Actions 写入 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整 git 历史（用于 git-last-commit）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # GitHub Pages Project Pages 部署在 /repo-name/ 子路径下，
      # 需要将 Vite base 设为 /<repo-name>/ 使资源路径正确。
      # 动态读取仓库名，自动适配 fork 后不同的仓库名。
      - name: Build
        run: yarn build
        env:
          # 将 base 设置为 /repo-name/ 以匹配 GitHub Pages Project Pages URL
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          # 保留旧文件（字典 JSON 等大文件不每次都重新上传）
          keep_files: false
          # 强制覆盖，确保每次部署都是最新版本
          force_orphan: true
