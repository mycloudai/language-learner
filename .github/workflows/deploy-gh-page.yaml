name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # 推送到 master 时自动触发
  workflow_dispatch: # 允许手动触发

# GitHub Actions 方式部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，但不取消正在进行的任务
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整 git 历史（用于 git-last-commit）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # GitHub Pages Project Pages 部署在 /repo-name/ 子路径下，
      # 需要将 Vite base 设为 /<repo-name>/ 使资源路径正确。
      # 动态读取仓库名，自动适配 fork 后不同的仓库名。
      - name: Build
        run: yarn build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ROUTER_BASENAME: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
