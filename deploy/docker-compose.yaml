# ============================================================================
# MyCloudAI Learner - Docker Compose
# ============================================================================
# 使用方式:
#   FRONTEND_TAG=latest API_TAG=latest docker compose up -d
#
# 环境变量:
#   REGISTRY     - 镜像仓库 (默认 registry.cn-shanghai.aliyuncs.com)
#   NAMESPACE    - 命名空间 (默认 jihaoyun)
#   FRONTEND_TAG - 前端镜像版本 (默认 latest)
#   API_TAG      - API 镜像版本 (默认 latest)
#   PORT         - 对外端口 (默认 8990)
# ============================================================================

version: "3.8"

services:
  # Backend API server (proxies AI requests)
  api:
    image: ${REGISTRY:-registry.cn-shanghai.aliyuncs.com}/${NAMESPACE:-jihaoyun}/mycloudai-learner-api:${API_TAG:-latest}
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - internal

  # Frontend (Nginx serving static + proxying /api to backend)
  frontend:
    image: ${REGISTRY:-registry.cn-shanghai.aliyuncs.com}/${NAMESPACE:-jihaoyun}/mycloudai-learner-frontend:${FRONTEND_TAG:-latest}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal

  # Auth proxy (Nginx with basic auth, public-facing)
  auth-proxy:
    image: nginx:alpine
    ports:
      - "${PORT:-8990}:80"
    volumes:
      - ./nginx/auth-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
