# Generate htpasswd: htpasswd -nb admin <your-password> | base64
# Or use: echo -n 'admin:$apr1$...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: auth-proxy-htpasswd
  namespace: mycloudai-learner
type: Opaque
stringData:
  # Replace with your generated htpasswd line before deploying.
  # Example: htpasswd -nb admin <your-password>
  .htpasswd: admin:REPLACE_WITH_GENERATED_HASH
