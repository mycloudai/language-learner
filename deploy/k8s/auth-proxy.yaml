apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: mycloudai-learner
  labels:
    app: auth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: htpasswd
              mountPath: /etc/nginx/conf.d/.htpasswd
              subPath: .htpasswd
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: config
          configMap:
            name: auth-proxy-config
        - name: htpasswd
          secret:
            secretName: auth-proxy-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: auth-proxy
  namespace: mycloudai-learner
spec:
  type: NodePort
  selector:
    app: auth-proxy
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
